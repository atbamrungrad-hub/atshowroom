
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtShowRoom</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}
header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 15px;
}
.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    text-align: center;
}
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}
.card h3 {
    margin: 10px 0 5px;
}
.card p {
    margin: 0 0 10px;
}
button {
    background: #06c755;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    cursor: pointer;
}
button:hover {
    opacity: 0.9;
}
</style>
</head>
<body>

<header>AT SHOWROOM</header>

<div class="grid">
    <div class="card">
        <img src="https://picsum.photos/300/400?1">
        <h3>เสื้อยืดสีขาว</h3>
        <p>ไซซ์: S, M, L</p>
        <a href="https://line.me/ti/p/~YOUR_LINE_ID">
            <button>สอบถามทาง LINE</button>
        </a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/400?2">
        <h3>เสื้อโปโลสีดำ</h3>
        <p>ไซซ์: M, L, XL</p>
        <a href="https://line.me/ti/p/~YOUR_LINE_ID">
            <button>สอบถามทาง LINE</button>
        </a>
    </div>
</div>

</body>
</html>
