<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT SHOWROOM</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background-color:#0f0f0f;
    color:white;
}

header{
    text-align:center;
    padding:30px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:40px;
    flex-wrap:wrap;
}

.card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    width:420px;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,215,0,0.1);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px rgba(255,215,0,0.4);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-body{
    padding:20px;
    text-align:center;
}

.card-body h2{
    margin:10px 0;
}

.btn{
    background:linear-gradient(45deg,#c9a227,#ffd700);
    border:none;
    padding:12px 25px;
    border-radius:30px;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<header>AT SHOWROOM</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1520975922203-b4d41f50b3f3">
        <div class="card-body">
            <h2>เสื้อยืดสีขาว</h2>
            <p>ไซซ์: S, M, L</p>
            <a href="https://line.me/" target="_blank">
                <button class="btn">สอบถามทาง LINE</button>
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8">
        <div class="card-body">
            <h2>เสื้อโปโลสีดำ</h2>
            <p>ไซซ์: M, L, XL</p>
            <a href="https://line.me/" target="_blank">
                <button class="btn">สอบถามทาง LINE</button>
            </a>
        </div>
    </div>

</div>

</body>
</html>
