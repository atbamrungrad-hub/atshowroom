<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtShowRooM - เสื้อผ้าแฟชั่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f9fafb; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-900 text-center md:text-left">AtShowRooM</h1>
            <div class="w-full md:w-auto flex justify-center">
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="🔍 ค้นหาสินค้า..." class="border border-gray-300 rounded-full px-5 py-2 text-sm focus:outline-none focus:border-gray-500 w-full max-w-sm shadow-inner">
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <div id="categoryContainer" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            </div>
        
        <div id="noResult" class="hidden text-center text-gray-500 py-10 w-full col-span-full">
            ไม่พบสินค้าที่คุณค้นหา
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeModal(event)">
        <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl relative flex flex-col md:flex-row modal-enter" onclick="event.stopPropagation()">
            
            <button onclick="closeModal(event)" class="absolute top-3 right-3 bg-white/80 rounded-full p-2 text-gray-600 hover:text-black shadow-md z-10 backdrop-blur">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="w-full md:w-1/2 bg-gray-100 aspect-[3/4] md:aspect-auto">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            
            <div class="w-full md:w-1/2 p-6 flex flex-col justify-between">
                <div>
                    <div id="modalBadge" class="inline-block bg-red-500 text-white text-xs px-2 py-1 rounded-md mb-2 hidden"></div>
                    <h2 id="modalTitle" class="text-xl md:text-2xl font-bold text-gray-900 mb-2"></h2>
                    <p class="text-gray-500 text-sm mb-4">รหัสสินค้า: <span id="modalId"></span></p>
                    
                    <div class="mb-6">
                        <span class="block text-sm font-semibold text-gray-700 mb-2">ไซซ์ที่มีจำหน่าย:</span>
                        <div id="modalSizes" class="flex flex-wrap gap-2">
                            </div>
                    </div>
                </div>
                
                <button onclick="contactLine()" class="mt-4 block w-full bg-[#06C755] hover:bg-[#05b34c] text-white text-center font-medium py-3 rounded-xl transition shadow-lg flex justify-center items-center gap-2">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.114.281.072.717.035.942l-.153.918c-.044.273-.209.826.726.43 1.051-.444 5.666-3.344 7.893-5.835C22.651 14.26 24 12.44 24 10.304z"/></svg>
                    สอบถามทาง LINE
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ตั้งค่าระบบร้านค้าของคุณพิรุณที่นี่
        // ==========================================
        
        // ใส่ลิงก์ LINE ของร้าน
        const LINE_URL = "https://line.me/ti/p/YOUR_LINE_ID"; 
        
        // ใส่ลิงก์ .csv ที่ได้จาก Google Sheets (ถ้ายังไม่มี ให้ปล่อยว่างไว้ ระบบจะใช้ข้อมูลจำลองแทน)
        const GOOGLE_SHEET_CSV_URL = ""; 

        // ==========================================

        let allProducts = [];
        let currentCategory = 'ทั้งหมด';

        // ข้อมูลจำลอง (Mock Data) สำหรับดูตัวอย่างระหว่างรอตารางจริง
        const mockCSVData = `id,name,image,sizes,badge,category
1,เสื้อยืดทรงโอเวอร์ไซซ์ สีขาว,https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500,S/M/L/XL,สินค้าใหม่,เสื้อยืด
2,เสื้อโปโลคอปก สีดำ,https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500,M/L,,เสื้อโปโล
3,แจ็คเก็ตยีนส์ สไตล์วินเทจ,https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=500,Free Size,ลดราคา,แจ็คเก็ต
4,เสื้อยืดคอกลม สีเทา,https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500,S/M/L,,เสื้อยืด`;

        // ฟังก์ชันแปลงข้อมูล CSV เป็นแบบที่เว็บเข้าใจ
        function parseCSV(text) {
            const lines = text.split('\\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const obj = {};
                const currentline = lines[i].split(',');
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentline[j] ? currentline[j].trim() : "";
                }
                result.push(obj);
            }
            return result;
        }

        // เริ่มโหลดข้อมูล
        async function initApp() {
            let dataText = mockCSVData;
            
            // ถ้าใส่ลิงก์ Google Sheets มา ให้ดึงข้อมูลจากตารางจริง
            if (GOOGLE_SHEET_CSV_URL !== "") {
                try {
                    const response = await fetch(GOOGLE_SHEET_CSV_URL);
                    dataText = await response.text();
                } catch (error) {
                    console.error("ไม่สามารถดึงข้อมูลจาก Google Sheets ได้:", error);
                }
            }

            allProducts = parseCSV(dataText);
            renderCategories();
            renderProducts(allProducts);
        }

        // วาดการ์ดสินค้าหน้าเว็บ
        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const noResult = document.getElementById('noResult');
            grid.innerHTML = '';

            if(products.length === 0) {
                noResult.classList.remove('hidden');
                return;
            } else {
                noResult.classList.add('hidden');
            }

            products.forEach(product => {
                const badgeHTML = product.badge ? `<div class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded-md font-medium z-10 shadow">${product.badge}</div>` : '';
                
                // แยกไซซ์ด้วยเครื่องหมาย / (เช่น S/M/L)
                const sizesText = product.sizes ? product.sizes.replace(/\\//g, ', ') : '';

                const cardHTML = `
                    <div class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition duration-300 overflow-hidden relative cursor-pointer group flex flex-col h-full" onclick='openModal(${JSON.stringify(product).replace(/'/g, "\\'")})'>
                        ${badgeHTML}
                        <div class="aspect-[3/4] bg-gray-100 overflow-hidden">
                            <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy">
                        </div>
                        <div class="p-3 md:p-4 flex flex-col flex-grow justify-between">
                            <div>
                                <h2 class="text-sm md:text-base font-semibold text-gray-800 line-clamp-2">${product.name}</h2>
                                <p class="text-xs text-gray-500 mt-1 mb-3">ไซซ์: ${sizesText}</p>
                            </div>
                            <button class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white text-center text-xs md:text-sm font-medium py-2 rounded-lg transition" onclick="event.stopPropagation(); contactLine('${product.name}')">
                                สอบถามทาง LINE
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // วาดปุ่มหมวดหมู่
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            // ดึงชื่อหมวดหมู่ทั้งหมดแบบไม่ซ้ำกัน
            const categories = ['ทั้งหมด', ...new Set(allProducts.map(p => p.category).filter(c => c))];
            
            container.innerHTML = '';
            categories.forEach(cat => {
                const isActive = cat === currentCategory;
                const btnClass = isActive 
                    ? "bg-gray-800 text-white px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap shadow-md transition" 
                    : "bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap hover:bg-gray-50 transition";
                
                container.innerHTML += `<button onclick="filterCategory('${cat}')" class="${btnClass}">${cat}</button>`;
            });
        }

        // ตัวกรองหมวดหมู่
        function filterCategory(cat) {
            currentCategory = cat;
            document.getElementById('searchInput').value = ''; // ล้างช่องค้นหา
            renderCategories();
            
            if (cat === 'ทั้งหมด') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderProducts(filtered);
            }
        }

        // ระบบค้นหา
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                (p.category && p.category.toLowerCase().includes(keyword))
            );
            
            // เปลี่ยนปุ่มหมวดหมู่กลับไปที่ 'ทั้งหมด' ถ้ามีการค้นหา
            currentCategory = 'ทั้งหมด';
            renderCategories();
            renderProducts(filtered);
        }

        // ระบบ Popup (Modal)
        function openModal(product) {
            document.getElementById('modalImg').src = product.image;
            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalId').innerText = product.id;
            
            const badge = document.getElementById('modalBadge');
            if(product.badge) {
                badge.innerText = product.badge;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            const sizesContainer = document.getElementById('modalSizes');
            sizesContainer.innerHTML = '';
            if(product.sizes) {
                const sizeArray = product.sizes.split('/');
                sizeArray.forEach(size => {
                    sizesContainer.innerHTML += `<span class="border border-gray-300 px-4 py-1.5 rounded-lg text-sm text-gray-700">${size.trim()}</span>`;
                });
            }

            // เก็บชื่อสินค้าไว้ส่งให้ LINE
            window.currentProductName = product.name;
            
            document.body.style.overflow = 'hidden'; // ล็อกการเลื่อนหน้าจอพื้นหลัง
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeModal(event) {
            if (event) {
                // ปิดเมื่อกดพื้นหลังสีดำ หรือปุ่มกากบาท
                if (event.target.id === 'productModal' || event.currentTarget.tagName === 'BUTTON') {
                    document.getElementById('productModal').classList.add('hidden');
                    document.body.style.overflow = 'auto';
                }
            } else {
                document.getElementById('productModal').classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        // ฟังก์ชันไปที่ LINE
        function contactLine(productName = '') {
            const name = productName || window.currentProductName;
            // สร้างข้อความทักทายอัตโนมัติ (ใส่ไปในลิงก์ LINE)
            const text = encodeURIComponent(`สวัสดีครับ สนใจสินค้า: ${name} ไม่ทราบว่ายังมีของไหมครับ?`);
            window.open(`${LINE_URL}?text=${text}`, '_blank');
        }

        // เรียกใช้งานตอนโหลดหน้าเว็บเสร็จ
        window.onload = initApp;

    </script>
</body>
</html>
